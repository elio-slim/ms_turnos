# Puerto propio: 8081
# Cada microservicio ocupa su propio puerto.
# ms-libros usará 8082.
server.port=8081

# Base de datos EXCLUSIVA de este microservicio.
# Regla de oro: cada microservicio tiene su propia BD.
# Crear 'categorias_db' vacía en phpMyAdmin antes de arrancar.
spring.datasource.url=jdbc:mysql://localhost:3306/categorias_db
spring.datasource.username=root
spring.datasource.password=Duoc.2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.application.name=ms-categorias
